
# ==========================================
# rtsp.netfleet.icu - Frigate API & WebUI
# ==========================================

# HTTP -> HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name rtsp.netfleet.icu;

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Main server block
server {
    listen 443 ssl http2;
    server_name rtsp.netfleet.icu;

    ssl_certificate     /usr/share/nginx/cert/rtsp.fullchain.pem;
    ssl_certificate_key /usr/share/nginx/cert/rtsp.privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Frigate API v2
    location /api/v2/ {
        proxy_pass http://172.17.0.1:8800/api/v2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # Frigate WebUI (upstream requires TLSv1.3 self-signed)
    location / {
        proxy_pass https://172.17.0.1:8971/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_ssl_verify off;
        proxy_ssl_protocols TLSv1.3;
        proxy_buffering off;
    }
}
